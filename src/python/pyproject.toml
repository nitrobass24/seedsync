[project]
name = "seedsync"
version = "0.0.0"
description = "File synchronization tool for seedboxes"
requires-python = ">=3.12"
dependencies = [
    "bottle>=0.12,<1.0",
    "pexpect>=4.8",
    "tblib>=3.0",
]

[dependency-groups]
test = [
    "pytest>=7.0",
    "parameterized>=0.9",
    "testfixtures>=8.0",
    "webtest>=3.0",
    "timeout-decorator>=0.5",
    "pytest-timeout>=2.0",
]
dev = [
    # Future: ruff, pyright
]

[tool.pytest.ini_options]
testpaths = ["tests/unittests"]
