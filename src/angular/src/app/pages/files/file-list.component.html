<div id="file-list">
    <div id="header">
        <div class="checkbox">
            <input type="checkbox" aria-label="Select all files" (change)="$any($event.target).checked ? onCheckAll() : onUncheckAll()" />
        </div>
        <div class="name">Filename</div>
        <div class="pair">Pair</div>
        <div class="status">Status</div>
        <div class="speed">Speed</div>
        <div class="eta">ETA</div>
        <div class="size">Size</div>
    </div>
    @if ((checked$ | async); as checked) {
      @if (checked.size) {
        <app-bulk-action-bar
            [count]="checked.size"
            (queueEvent)="onBulkQueue()"
            (stopEvent)="onBulkStop()"
            (deleteLocalEvent)="onBulkDeleteLocal()"
            (deleteRemoteEvent)="onBulkDeleteRemote()"
            (clearEvent)="onUncheckAll()">
        </app-bulk-action-bar>
      }
    }
    <cdk-virtual-scroll-viewport itemSize="82" class="file-viewport">
        <div *cdkVirtualFor="let file of files; trackBy: identify; let isEven = even" class="file-row" [class.even]="isEven">
            <app-file
                [file]="file"
                [options]="options"
                (click)="onSelect(file)"
                (checkEvent)="onCheck($event)"
                (queueEvent)="onQueue($event)"
                (stopEvent)="onStop($event)"
                (extractEvent)="onExtract($event)"
                (validateEvent)="onValidate($event)"
                (deleteLocalEvent)="onDeleteLocal($event)"
                (deleteRemoteEvent)="onDeleteRemote($event)">
            </app-file>
        </div>
    </cdk-virtual-scroll-viewport>
</div>
