name: CI

on:
  push:
    branches: [master, develop]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Should we publish Docker images? True on version tags, develop pushes, or manual dispatch.
  SHOULD_PUBLISH: ${{ startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/angular/package-lock.json

      - name: Install dependencies
        working-directory: src/angular
        run: npm ci

      - name: Run tests
        working-directory: src/angular
        run: npx ng test

  python-test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/python/requirements.txt
            src/python/requirements-test.txt

      - name: Install dependencies
        working-directory: src/python
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests
        working-directory: src/python
        env:
          PYTHONPATH: .
        run: >-
          pytest tests/unittests -v --tb=short
          --timeout=30
          --ignore=tests/unittests/test_lftp
          --ignore=tests/unittests/test_ssh
          --ignore=tests/unittests/test_system
          --ignore=tests/unittests/test_controller/test_scan/test_remote_scanner.py

  angular-build:
    name: Build Angular
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/angular/package-lock.json

      - name: Install dependencies
        working-directory: src/angular
        run: npm ci

      - name: Build Angular frontend
        working-directory: src/angular
        run: npx ng build --configuration=production --output-path /tmp/angular-output/build

      - name: Upload Angular build artifact
        uses: actions/upload-artifact@v7
        with:
          name: angular-build
          path: /tmp/angular-output
          retention-days: 1

  build-test:
    name: Build and Test (amd64)
    if: ${{ !(startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/docker/build/docker-image/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: seedsync:test
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8800:8800 seedsync:test
          for i in $(seq 1 30); do
            curl -sf http://localhost:8800/ && break
            [ "$i" -eq 30 ] && { echo "Container failed to become ready"; docker logs test-container; exit 1; }
            sleep 1
          done
          docker logs test-container
          docker stop test-container

  build-amd64:
    name: Build (amd64)
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    needs: [angular-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Angular build artifact
        uses: actions/download-artifact@v8
        with:
          name: angular-build
          path: /tmp/angular-output

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/docker/build/docker-image/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: seedsync:test
          build-contexts: |
            angular-builder=/tmp/angular-output
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8800:8800 seedsync:test
          for i in $(seq 1 30); do
            curl -sf http://localhost:8800/ && break
            [ "$i" -eq 30 ] && { echo "Container failed to become ready"; docker logs test-container; exit 1; }
            sleep 1
          done
          docker logs test-container
          docker stop test-container

      - name: Push amd64 image by digest
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/docker/build/docker-image/Dockerfile
          platforms: linux/amd64
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          build-contexts: |
            angular-builder=/tmp/angular-output
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build (arm64)
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    needs: [angular-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Angular build artifact
        uses: actions/download-artifact@v8
        with:
          name: angular-build
          path: /tmp/angular-output

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image by digest
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/docker/build/docker-image/Dockerfile
          platforms: linux/arm64
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          build-contexts: |
            angular-builder=/tmp/angular-output
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish
    if: >-
      always() && !cancelled()
      && (startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/develop' && github.event_name == 'push') || github.event_name == 'workflow_dispatch')
      && needs.unit-test.result == 'success'
      && needs.python-test.result == 'success'
      && needs.build-amd64.result == 'success'
      && needs.build-arm64.result == 'success'
    needs: [unit-test, python-test, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (release)
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta-release
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Extract metadata (develop)
        if: github.ref == 'refs/heads/develop'
        id: meta-develop
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=develop

      - name: Extract metadata (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/develop'
        id: meta-dispatch
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
